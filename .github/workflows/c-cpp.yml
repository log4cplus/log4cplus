name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - os: 'ubuntu-24.04'
          cc: 'gcc-14'
          cxx: 'g++-14'
          prereq: |
            sudo apt update
            sudo apt install libboost-iostreams-dev qt6-base-dev pkgconf
          configure_flags: '--with-qt6'
          build-type: autotools


        - os: 'ubuntu-24.04-arm'
          cc: 'gcc'
          cxx: 'g++'
          prereq: |
            sudo apt update
            sudo apt install pkgconf
          configure_flags: ''
          build-type: cmake

        # Enable macOS build by installing Boost via Homebrew
        - os: 'macos-15'
          cc: 'clang'
          cxx: 'clang++'
          cppflags: '-I$(brew --prefix boost)/include'
          prereq: |
            #brew update
            brew install boost
            sudo xcode-select -s '/Applications/Xcode_16.4.app/Contents/Developer'
          configure_flags: ''
          build-type: autotools

        - os: 'macos-15'
          cc: '$(brew --prefix llvm@18)/bin/clang'
          cxx: '$(brew --prefix llvm@18)/bin/clang++'
          cppflags: '-I$(brew --prefix boost)/include'
          prereq: |
            brew install boost
            sudo xcode-select -s '/Applications/Xcode_16.4.app/Contents/Developer'
          configure_flags: ''
          build-type: autotools

        - os: 'macos-15'
          cc: 'clang'
          cxx: 'clang++'
          cppflags: '-I$(brew --prefix boost)/include'
          prereq: |
            #brew update
            brew install boost
            sudo xcode-select -s '/Applications/Xcode_16.4.app/Contents/Developer'
          configure_flags: ''
          build-type: cmake

    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: install prerequisites
      run: |
        ${{ matrix.config.prereq }}
    - name: configure
      run: |
        ${{ matrix.config.cxx }} --version
        ./scripts/fix-timestamps.sh
        mkdir objdir
        cd objdir
        buildtype="${{ matrix.config.build-type }}"
        case "${buildtype}" in #(
        autotools)
            ../configure CPPFLAGS="${{ matrix.config.cppflags }}" \
                CC="${{ matrix.config.cc }}" \
                CXX="${{ matrix.config.cxx }}" \
                ${{ matrix.config.configure_flags }} \
                --enable-shared --enable-unit-tests --with-working-locale
            ./config.status --config
        ;;
        #(
        cmake)
            cmake ${{ matrix.config.configure_flags }} ..
        ;;
        #(
        *) 
            echo "Unsupported build type: ${buildtype}"
            exit 1
        ;;
        esac
    - name: make
      run: |
        cd objdir
        buildtype="${{ matrix.config.build-type }}"
        case "${buildtype}" in #(
        autotools)
          make
        ;;
        #(
        cmake)
          cmake --build .
        ;;
        #(
        *) 
          echo "Unsupported build type: ${buildtype}"
          exit 1
        ;;
        esac
    - name: make check
      run: |
        cd objdir
        buildtype="${{ matrix.config.build-type }}"
        case "${buildtype}" in #(
        autotools)
          make check
        ;;
        #(
        cmake)
          ctest --test-dir . --output-on-failure
        ;;
        #(
        *) 
          echo "Unsupported build type: ${buildtype}"
          exit 1
        ;;
        esac

  freebsd:
    strategy:
      fail-fast: false
      matrix:
        release: ["15.0", "14.4", "13.5"]
        build-type: [cmake, autotools]
    runs-on: ubuntu-latest
    name: ${{ matrix.build-type == 'cmake' && 'CMake' || 'Autotools' }} / FreeBSD ${{ matrix.release }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Build and test on FreeBSD
      uses: vmactions/freebsd-vm@v1
      with:
        release: ${{ matrix.release }}
        usesh: true
        prepare: |
          pkg install -y cmake autoconf automake libtool gmake pkgconf boost-all
        run: |
          set -e
          c++ --version
          ./scripts/fix-timestamps.sh
          mkdir objdir
          cd objdir
          buildtype="${{ matrix.build-type }}"
          case "${buildtype}" in #(
          autotools)
              ../configure CPPFLAGS="-I/usr/local/include" LDFLAGS="-L/usr/local/lib" \
                  CC="cc" CXX="c++" \
                  --enable-shared --enable-unit-tests --with-working-locale
              ./config.status --config
              gmake
              gmake check
          ;;
          #(
          cmake)
              cmake ..
              cmake --build .
              ctest --test-dir . --output-on-failure
          ;;
          #(
          *)
              echo "Unsupported build type: ${buildtype}"
              exit 1
          ;;
          esac

  openbsd:
    strategy:
      fail-fast: false
      matrix:
        build-type: [cmake, autotools]
    runs-on: ubuntu-latest
    name: ${{ matrix.build-type == 'cmake' && 'CMake' || 'Autotools' }} / OpenBSD

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Build and test on OpenBSD
      uses: vmactions/openbsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg_add cmake autoconf automake libtool gmake pkgconf boost
        run: |
          set -e
          export AUTOCONF_VERSION=2.72
          export AUTOMAKE_VERSION=1.16
          c++ --version
          ./scripts/fix-timestamps.sh
          mkdir objdir
          cd objdir
          buildtype="${{ matrix.build-type }}"
          case "${buildtype}" in #(
          autotools)
              ../configure CPPFLAGS="-I/usr/local/include" LDFLAGS="-L/usr/local/lib" \
                  CC="cc" CXX="c++" \
                  --enable-shared --enable-unit-tests --with-working-locale
              ./config.status --config
              gmake
              gmake check
          ;;
          #(
          cmake)
              cmake ..
              cmake --build .
              ctest --test-dir . --output-on-failure
          ;;
          #(
          *)
              echo "Unsupported build type: ${buildtype}"
              exit 1
          ;;
          esac

  netbsd:
    strategy:
      fail-fast: false
      matrix:
        build-type: [cmake, autotools]
    runs-on: ubuntu-latest
    name: ${{ matrix.build-type == 'cmake' && 'CMake' || 'Autotools' }} / NetBSD

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Build and test on NetBSD
      uses: vmactions/netbsd-vm@v1
      with:
        usesh: true
        prepare: |
          export PKG_PATH="https://cdn.NetBSD.org/pub/pkgsrc/packages/NetBSD/$(uname -p)/$(uname -r | cut -d_ -f1)/All"
          pkg_add cmake autoconf automake libtool gmake pkgconf boost-headers boost-libs gcc14
        run: |
          set -e
          export CC=/usr/pkg/gcc14/bin/gcc
          export CXX=/usr/pkg/gcc14/bin/g++
          ${CXX} --version
          ./scripts/fix-timestamps.sh
          mkdir objdir
          cd objdir
          buildtype="${{ matrix.build-type }}"
          case "${buildtype}" in #(
          autotools)
              ../configure CPPFLAGS="-I/usr/pkg/include" LDFLAGS="-L/usr/pkg/lib" \
                  CC="${CC}" CXX="${CXX}" \
                  --enable-shared --enable-unit-tests --with-working-locale
              ./config.status --config
              gmake
              gmake check
          ;;
          #(
          cmake)
              cmake -DCMAKE_C_COMPILER="${CC}" -DCMAKE_CXX_COMPILER="${CXX}" ..
              cmake --build .
              ctest --test-dir . --output-on-failure
          ;;
          #(
          *)
              echo "Unsupported build type: ${buildtype}"
              exit 1
          ;;
          esac

  dragonflybsd:
    strategy:
      fail-fast: false
      matrix:
        build-type: [cmake, autotools]
    runs-on: ubuntu-latest
    name: ${{ matrix.build-type == 'cmake' && 'CMake' || 'Autotools' }} / DragonFly BSD

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Build and test on DragonFly BSD
      uses: vmactions/dragonflybsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg install -y cmake autoconf automake libtool gmake pkgconf gcc14
        run: |
          set -e
          export CC=gcc14
          export CXX=g++14
          export LDFLAGS="-Wl,-rpath=/usr/local/lib/gcc14"
          ${CXX} --version
          ./scripts/fix-timestamps.sh
          mkdir objdir
          cd objdir
          buildtype="${{ matrix.build-type }}"
          case "${buildtype}" in #(
          autotools)
              ../configure LDFLAGS="${LDFLAGS}" \
                  CC="${CC}" CXX="${CXX}" \
                  --enable-shared --enable-unit-tests --with-working-locale
              ./config.status --config
              gmake
              gmake check
          ;;
          #(
          cmake)
              cmake -DCMAKE_C_COMPILER="${CC}" -DCMAKE_CXX_COMPILER="${CXX}" \
                  -DCMAKE_EXE_LINKER_FLAGS="${LDFLAGS}" \
                  -DCMAKE_SHARED_LINKER_FLAGS="${LDFLAGS}" ..
              cmake --build .
              ctest --test-dir . --output-on-failure
          ;;
          #(
          *)
              echo "Unsupported build type: ${buildtype}"
              exit 1
          ;;
          esac

  windows-cmake:
    strategy:
      fail-fast: false
      matrix:
        config:
        - os: 'windows-2022'
          arch: 'x64'
        - os: 'windows-11-arm'
          arch: 'ARM64'

    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: configure
      run: >
        cmake
        -S .
        -B objdir
        -G "Visual Studio 17 2022"
        -A ${{ matrix.config.arch }}
        -DCMAKE_BUILD_TYPE=Release
    - name: build
      run: cmake --build objdir --config Release
    - name: test
      run: ctest --test-dir objdir --build-config Release --output-on-failure
