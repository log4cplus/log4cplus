name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - os: 'ubuntu-24.04'
          cc: 'gcc-14'
          cxx: 'g++-14'
          prereq: |
            sudo apt update
            sudo apt install libboost-iostreams-dev qt6-base-dev pkgconf
          configure_flags: '--with-qt6'
          build-type: autotools


        - os: 'ubuntu-24.04-arm'
          cc: 'gcc'
          cxx: 'g++'
          prereq: |
            sudo apt update
            sudo apt install pkgconf
          configure_flags: ''
          build-type: cmake

        # Enable macOS build by installing Boost via Homebrew
        - os: 'macos-15'
          cc: 'clang'
          cxx: 'clang++'
          cppflags: '-I$(brew --prefix boost)/include'
          prereq: |
            #brew update
            brew install boost
            sudo xcode-select -s '/Applications/Xcode_16.4.app/Contents/Developer'
          configure_flags: ''
          build-type: autotools

        - os: 'macos-15'
          cc: '$(brew --prefix llvm@18)/bin/clang'
          cxx: '$(brew --prefix llvm@18)/bin/clang++'
          cppflags: '-I$(brew --prefix boost)/include'
          prereq: |
            brew install boost
            sudo xcode-select -s '/Applications/Xcode_16.4.app/Contents/Developer'
          configure_flags: ''
          build-type: autotools

        - os: 'macos-15'
          cc: 'clang'
          cxx: 'clang++'
          cppflags: '-I$(brew --prefix boost)/include'
          prereq: |
            #brew update
            brew install boost
            sudo xcode-select -s '/Applications/Xcode_16.4.app/Contents/Developer'
          configure_flags: ''
          build-type: cmake

    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: install prerequisites
      run: |
        ${{ matrix.config.prereq }}
    - name: configure
      run: |
        ${{ matrix.config.cxx }} --version
        ./scripts/fix-timestamps.sh
        mkdir objdir
        cd objdir
        buildtype="${{ matrix.config.build-type }}"
        case "${buildtype}" in #(
        autotools)
            ../configure CPPFLAGS="${{ matrix.config.cppflags }}" \
                CC="${{ matrix.config.cc }}" \
                CXX="${{ matrix.config.cxx }}" \
                ${{ matrix.config.configure_flags }} \
                --enable-shared --enable-unit-tests --with-working-locale
            ./config.status --config
        ;;
        #(
        cmake)
            cmake ${{ matrix.config.configure_flags }} ..
        ;;
        #(
        *) 
            echo "Unsupported build type: ${buildtype}"
            exit 1
        ;;
        esac
    - name: make
      run: |
        cd objdir
        buildtype="${{ matrix.config.build-type }}"
        case "${buildtype}" in #(
        autotools)
          make
        ;;
        #(
        cmake)
          cmake --build .
        ;;
        #(
        *) 
          echo "Unsupported build type: ${buildtype}"
          exit 1
        ;;
        esac
    - name: make check
      run: |
        cd objdir
        buildtype="${{ matrix.config.build-type }}"
        case "${buildtype}" in #(
        autotools)
          make check
        ;;
        #(
        cmake)
          ctest --test-dir .
        ;;
        #(
        *) 
          echo "Unsupported build type: ${buildtype}"
          exit 1
        ;;
        esac

  windows-cmake:
    strategy:
      fail-fast: false
      matrix:
        config:
        - os: 'windows-2022'
          arch: 'x64'
        - os: 'windows-11-arm'
          arch: 'ARM64'

    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: configure
      run: >
        cmake
        -S .
        -B objdir
        -G "Visual Studio 17 2022"
        -A ${{ matrix.config.arch }}
        -DCMAKE_BUILD_TYPE=Release
    - name: build
      run: cmake --build objdir --config Release
    - name: test
      run: ctest --test-dir objdir --build-config Release --output-on-failure
